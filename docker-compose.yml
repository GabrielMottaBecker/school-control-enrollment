services:
  rabbitmq:
    image: rabbitmq:3-management
    container_name: school-control-rabbitmq
    ports:
      - "5672:5672" # porta AMQP 
      - "15672:15672" # management UI 
    environment:
      RABBITMQ_DEFAULT_USER: admin
      RABBITMQ_DEFAULT_PASS: admin
    volumes:
      - rabbitmq_data:/var/lib/rabbitmq

volumes:
  rabbitmq_data:
